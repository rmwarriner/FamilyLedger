name: Release

on:
  workflow_dispatch:

jobs:
  tauri-release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install
        run: pnpm install --frozen-lockfile=false
      - name: Build Frontend
        run: pnpm --filter @familyledger/desktop build
      - name: Tauri Build
        run: cd apps/desktop/src-tauri && cargo build --release
      - name: TODO Sign and Publish
        run: echo "TODO(impl): sign artifacts and publish release assets"
