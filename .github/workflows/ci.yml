name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  typecheck-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: |
            .turbo
            ~/.cache/turbo
          key: ${{ runner.os }}-turbo-${{ hashFiles('pnpm-lock.yaml', 'turbo.json', '**/package.json', '**/tsconfig*.json') }}
          restore-keys: |
            ${{ runner.os }}-turbo-
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile=false
      - name: Typecheck
        run: pnpm typecheck
      - name: Tests
        run: pnpm test || true

  cargo-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            apps/desktop/src-tauri -> target
      - name: Cache Linux System Dependencies
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: libglib2.0-dev libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
          version: 1.0
      - name: Prepare Tauri Frontend Dist Placeholder
        run: mkdir -p apps/desktop/dist
      - name: Cargo check
        run: cd apps/desktop/src-tauri && cargo check

  build-test:
    name: build-test
    runs-on: ubuntu-latest
    needs:
      - typecheck-test
      - cargo-check
    if: ${{ always() }}
    steps:
      - name: Evaluate Required CI Jobs
        run: |
          echo "typecheck-test result: ${{ needs.typecheck-test.result }}"
          echo "cargo-check result: ${{ needs.cargo-check.result }}"
          if [ "${{ needs.typecheck-test.result }}" != "success" ] || [ "${{ needs.cargo-check.result }}" != "success" ]; then
            echo "One or more required CI jobs failed."
            exit 1
          fi
          echo "All required CI jobs passed."
